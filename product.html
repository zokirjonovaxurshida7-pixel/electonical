<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahsulot - TechStore</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="nav-logo"><i class="fas fa-bolt"></i><span>Tech</span>Store</a>
      <div class="search-bar">
        <form id="search-form">
          <input type="text" id="search-input" placeholder="Mahsulot qidiring...">
          <button type="submit"><i class="fas fa-search"></i></button>
        </form>
      </div>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Bosh sahifa</a>
        <a href="products.html">Mahsulotlar</a>
        <a href="orders.html">Buyurtmalar</a>
      </nav>
      <div class="nav-actions">
        <button class="nav-icon-btn" id="cart-btn">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </button>
        <button class="btn btn-primary" id="login-btn"><i class="fas fa-user"></i> Kirish</button>
        <div class="user-menu" id="user-menu" style="display:none">
          <button class="user-menu-btn">
            <div class="avatar">U</div>
            <span id="user-name">User</span>
            <i class="fas fa-chevron-down" style="font-size:.7rem"></i>
          </button>
          <div class="dropdown">
            <a href="profile.html"><i class="fas fa-user"></i> Profil</a>
            <a href="orders.html"><i class="fas fa-box"></i> Buyurtmalarim</a>
            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">Bosh sahifa</a> / <span>Mahsulot</span>
  </div>

  <div class="product-detail" id="product-container">
    <!-- Gallery -->
    <div class="product-gallery">
      <div class="main-image-wrap">
        <img id="main-image" src="https://via.placeholder.com/500x400" alt="Mahsulot">
      </div>
      <div class="thumbnails" id="thumbnails"></div>
    </div>

    <!-- Info -->
    <div class="product-info">
      <p class="product-brand" id="product-brand"></p>
      <h1 id="product-name">Yuklanmoqda...</h1>
      <div class="product-rating">
        <span class="stars" id="product-rating-stars"></span>
        <span class="review-count" id="product-review-count"></span>
      </div>
      <div class="price-section">
        <span class="product-price" id="product-price"></span>
        <span class="product-original-price" id="product-original-price" style="display:none"></span>
        <span class="discount-badge" id="product-discount" style="display:none"></span>
      </div>
      <span class="stock-badge" id="product-stock"></span>

      <div class="qty-selector">
        <button onclick="changeQty(-1)">−</button>
        <input type="number" id="qty-input" value="1" min="1">
        <button onclick="changeQty(1)">+</button>
      </div>

      <div class="product-actions">
        <button class="btn btn-primary btn-lg" id="add-to-cart-btn">
          <i class="fas fa-cart-plus"></i> Savatga qo'shish
        </button>
        <button class="btn btn-secondary btn-lg" id="buy-now-btn">
          <i class="fas fa-bolt"></i> Hozir sotib olish
        </button>
      </div>

      <div style="background:var(--gray-50);border-radius:var(--radius);padding:16px;margin-top:8px">
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          <span style="font-size:.8rem;color:var(--gray-600)"><i class="fas fa-truck" style="color:var(--primary)"></i> Bepul yetkazib berish</span>
          <span style="font-size:.8rem;color:var(--gray-600)"><i class="fas fa-shield-alt" style="color:var(--success)"></i> 1 yil kafolat</span>
          <span style="font-size:.8rem;color:var(--gray-600)"><i class="fas fa-undo" style="color:var(--warning)"></i> 14 kun qaytarish</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs: Description / Specs / Reviews -->
  <div style="margin-top:48px">
    <div style="display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:28px">
      <button class="tab-btn active" onclick="showTab('desc',this)" style="padding:12px 24px;background:none;font-weight:600;font-size:.9rem;border-bottom:2px solid var(--primary);margin-bottom:-2px;color:var(--primary)">Tavsif</button>
      <button class="tab-btn" onclick="showTab('specs',this)" style="padding:12px 24px;background:none;font-weight:600;font-size:.9rem;color:var(--gray-500)">Xususiyatlar</button>
      <button class="tab-btn" onclick="showTab('reviews',this)" style="padding:12px 24px;background:none;font-weight:600;font-size:.9rem;color:var(--gray-500)">Sharhlar</button>
    </div>

    <div id="tab-desc">
      <p id="product-description" style="color:var(--gray-600);line-height:1.8;font-size:.95rem"></p>
    </div>

    <div id="tab-specs" style="display:none">
      <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);overflow:hidden">
        <table class="specs-table">
          <tbody id="product-specs"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-reviews" style="display:none">
      <!-- Add review -->
      <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);padding:24px;margin-bottom:24px">
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:16px">Sharh qoldiring</h3>
        <form id="review-form">
          <div class="form-group">
            <label class="form-label">Baho</label>
            <div class="stars-input">
              <span class="star-select" data-val="1"><i class="fas fa-star"></i></span>
              <span class="star-select" data-val="2"><i class="fas fa-star"></i></span>
              <span class="star-select" data-val="3"><i class="fas fa-star"></i></span>
              <span class="star-select" data-val="4"><i class="fas fa-star"></i></span>
              <span class="star-select" data-val="5"><i class="fas fa-star"></i></span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Sharh</label>
            <textarea id="review-comment" class="form-control" placeholder="Mahsulot haqida fikringizni yozing..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Sharh yuborish</button>
        </form>
      </div>
      <div id="reviews-list"></div>
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:60px">
  <div class="container">
    <div class="footer-bottom"><span>© 2024 TechStore</span></div>
  </div>
</footer>

<!-- CART SIDEBAR -->
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h3><i class="fas fa-shopping-cart"></i> Savat</h3>
    <button class="cart-close" id="close-cart"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total-row"><span>Jami:</span><span id="cart-total">0 so'm</span></div>
    <button class="btn btn-primary btn-block btn-lg" onclick="window.location.href='checkout.html'">
      <i class="fas fa-lock"></i> Buyurtma berish
    </button>
  </div>
</div>
<div class="overlay" id="overlay"></div>

<!-- AUTH MODAL -->
<div class="modal" id="auth-modal">
  <div class="modal-backdrop" onclick="closeLoginModal()"></div>
  <div class="modal-box">
    <button class="modal-close" onclick="closeLoginModal()"><i class="fas fa-times"></i></button>
    <div class="modal-logo"><i class="fas fa-bolt"></i><h2>TechStore</h2></div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Kirish</div>
      <div class="auth-tab" data-tab="register">Ro'yxatdan o'tish</div>
    </div>
    <form class="auth-form active" id="login-form">
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="login-email" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Parol</label><input type="password" id="login-password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Kirish</button>
    </form>
    <form class="auth-form" id="register-form">
      <div class="form-group"><label class="form-label">Ism</label><input type="text" id="reg-name" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="reg-email" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Telefon</label><input type="tel" id="reg-phone" class="form-control"></div>
      <div class="form-group"><label class="form-label">Parol</label><input type="password" id="reg-password" class="form-control" required minlength="6"></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Ro'yxatdan o'tish</button>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/animations.js"></script>
<script src="js/app.js"></script>
<script src="js/product.js"></script>
<script>
function showTab(tab, btn) {
  ['desc','specs','reviews'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.style.borderBottom = 'none';
    b.style.color = 'var(--gray-500)';
  });
  btn.style.borderBottom = '2px solid var(--primary)';
  btn.style.color = 'var(--primary)';
}
</script>
</body>
</html>
