<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahsulotlar - Admin TechStore</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/theme.js"></script>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <a href="../index.html" class="nav-logo"><i class="fas fa-bolt"></i><span style="color:var(--white)">Tech</span>Store</a>
      <div style="font-size:.7rem;color:var(--gray-500);margin-top:4px">Admin Panel</div>
    </div>
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="products.html" class="admin-nav-item active"><i class="fas fa-box"></i> Mahsulotlar</a>
      <a href="categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Kategoriyalar</a>
      <a href="orders.html" class="admin-nav-item"><i class="fas fa-shopping-bag"></i> Buyurtmalar</a>
      <a href="users.html" class="admin-nav-item"><i class="fas fa-users"></i> Foydalanuvchilar</a>
      <a href="profile.html" class="admin-nav-item"><i class="fas fa-user-circle"></i> Profil</a>
      <a href="../index.html" class="admin-nav-item"><i class="fas fa-store"></i> Do'konga qaytish</a>
    </nav>
    <div class="admin-sidebar-footer">
      <div class="admin-user-info">
        <div class="avatar">A</div>
        <div><strong id="admin-name">Admin</strong><small>Administrator</small></div>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" id="admin-logout" style="color:var(--gray-400)">
        <i class="fas fa-sign-out-alt"></i> Chiqish
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Mahsulotlar</h1>
      <div class="theme-toggle-wrap">
        <i class="fas fa-sun sun-icon"></i>
        <button class="theme-toggle" id="theme-toggle" title="Tungi/Kunduzgi rejim"></button>
        <i class="fas fa-moon moon-icon"></i>
      </div>
    </div>
    <div class="admin-content">
      <div class="admin-toolbar">
        <div style="display:flex;gap:10px;align-items:center">
          <input type="text" id="product-search" class="form-control" placeholder="Mahsulot qidirish..." style="width:260px">
        </div>
        <button class="btn btn-primary" id="add-product-btn">
          <i class="fas fa-plus"></i> Mahsulot qo'shish
        </button>
      </div>

      <div class="admin-card">
        <div class="admin-card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Rasm</th>
                <th>Nomi</th>
                <th>Kategoriya</th>
                <th>Narx</th>
                <th>Ombor</th>
                <th>Status</th>
                <th>Amallar</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)"><i class="fas fa-spinner fa-spin"></i> Yuklanmoqda...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- PRODUCT MODAL -->
<div class="admin-modal" id="product-modal">
  <div class="admin-modal-backdrop" onclick="document.getElementById('product-modal').classList.remove('active')"></div>
  <div class="admin-modal-box">
    <h3 id="product-modal-title">Mahsulot qo'shish</h3>
    <form id="product-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nomi *</label>
          <input type="text" id="prod-name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Slug *</label>
          <input type="text" id="prod-slug" class="form-control" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Narx (so'm) *</label>
          <input type="number" id="prod-price" class="form-control" required min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Ombor *</label>
          <input type="number" id="prod-stock" class="form-control" required min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Brend</label>
          <input type="text" id="prod-brand" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Kategoriya *</label>
          <select id="prod-category" class="form-control" required></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tavsif *</label>
        <textarea id="prod-description" class="form-control" rows="3" required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Rasm URL-lari (har bir qatorda bitta)</label>
        <textarea id="prod-images" class="form-control" rows="3" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg"></textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="prod-featured" style="width:16px;height:16px;accent-color:var(--primary)">
          <span class="form-label" style="margin:0">Tavsiya etilgan mahsulot</span>
        </label>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn btn-ghost" id="close-product-modal">Bekor qilish</button>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script>
  function formatPrice(p) { return new Intl.NumberFormat('uz-UZ').format(p) + " so'm"; }
  function showToast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'times-circle'}"></i><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  }
</script>
<script src="../js/admin.js"></script>
</body>
</html>
