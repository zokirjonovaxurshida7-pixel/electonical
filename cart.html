<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savat - TechStore</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="nav-logo"><i class="fas fa-bolt"></i><span>Tech</span>Store</a>
      <div class="search-bar">
        <form id="search-form">
          <input type="text" id="search-input" placeholder="Mahsulot qidiring...">
          <button type="submit"><i class="fas fa-search"></i></button>
        </form>
      </div>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Bosh sahifa</a>
        <a href="products.html">Mahsulotlar</a>
        <a href="orders.html">Buyurtmalar</a>
      </nav>
      <div class="nav-actions">
        <button class="nav-icon-btn" id="cart-btn">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </button>
        <button class="btn btn-primary" id="login-btn"><i class="fas fa-user"></i> Kirish</button>
        <div class="user-menu" id="user-menu" style="display:none">
          <button class="user-menu-btn">
            <div class="avatar">U</div>
            <span id="user-name">User</span>
            <i class="fas fa-chevron-down" style="font-size:.7rem"></i>
          </button>
          <div class="dropdown">
            <a href="profile.html"><i class="fas fa-user"></i> Profil</a>
            <a href="orders.html"><i class="fas fa-box"></i> Buyurtmalarim</a>
            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container" style="padding-top:32px;padding-bottom:60px">
  <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:24px"><i class="fas fa-shopping-cart" style="color:var(--primary)"></i> Savat</h1>

  <div id="cart-page-content"></div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom"><span>© 2024 TechStore</span></div>
  </div>
</footer>

<!-- CART SIDEBAR -->
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h3><i class="fas fa-shopping-cart"></i> Savat</h3>
    <button class="cart-close" id="close-cart"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total-row"><span>Jami:</span><span id="cart-total">0 so'm</span></div>
    <button class="btn btn-primary btn-block btn-lg" onclick="window.location.href='checkout.html'">
      <i class="fas fa-lock"></i> Buyurtma berish
    </button>
  </div>
</div>
<div class="overlay" id="overlay"></div>

<!-- AUTH MODAL -->
<div class="modal" id="auth-modal">
  <div class="modal-backdrop" onclick="closeLoginModal()"></div>
  <div class="modal-box">
    <button class="modal-close" onclick="closeLoginModal()"><i class="fas fa-times"></i></button>
    <div class="modal-logo"><i class="fas fa-bolt"></i><h2>TechStore</h2></div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Kirish</div>
      <div class="auth-tab" data-tab="register">Ro'yxatdan o'tish</div>
    </div>
    <form class="auth-form active" id="login-form">
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="login-email" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Parol</label><input type="password" id="login-password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Kirish</button>
    </form>
    <form class="auth-form" id="register-form">
      <div class="form-group"><label class="form-label">Ism</label><input type="text" id="reg-name" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="reg-email" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Telefon</label><input type="tel" id="reg-phone" class="form-control"></div>
      <div class="form-group"><label class="form-label">Parol</label><input type="password" id="reg-password" class="form-control" required minlength="6"></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Ro'yxatdan o'tish</button>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>
<script>
function renderCartPage() {
  const items = Cart.get();
  const container = document.getElementById('cart-page-content');

  if (!items.length) {
    container.innerHTML = `
      <div class="empty-cart">
        <i class="fas fa-shopping-cart"></i>
        <h3>Savat bo'sh</h3>
        <p>Hali hech narsa qo'shilmagan</p>
        <a href="products.html" class="btn btn-primary btn-lg">Xarid qilishni boshlash</a>
      </div>`;
    return;
  }

  const subtotal = Cart.getTotal();
  const shipping = subtotal >= 500000 ? 0 : 30000;
  const total = subtotal + shipping;

  container.innerHTML = `
    <div class="cart-page">
      <div class="cart-table">
        <table>
          <thead>
            <tr>
              <th>Mahsulot</th>
              <th>Narx</th>
              <th>Miqdor</th>
              <th>Jami</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cart-tbody">
            ${items.map(item => `
              <tr id="row-${item.productId}">
                <td>
                  <div class="cart-product-cell">
                    <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/64x64'">
                    <div>
                      <div class="cart-product-name">${item.name}</div>
                    </div>
                  </div>
                </td>
                <td>${formatPrice(item.price)}</td>
                <td>
                  <div class="qty-stepper">
                    <button onclick="updateCartItem('${item.productId}', ${item.quantity - 1})">−</button>
                    <input type="number" value="${item.quantity}" min="1"
                      onchange="updateCartItem('${item.productId}', parseInt(this.value))">
                    <button onclick="updateCartItem('${item.productId}', ${item.quantity + 1})">+</button>
                  </div>
                </td>
                <td><strong>${formatPrice(item.price * item.quantity)}</strong></td>
                <td>
                  <button class="remove-btn" onclick="removeCartItem('${item.productId}')">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <div class="order-summary-card">
        <h3>Buyurtma xulosasi</h3>
        <div class="summary-row"><span>Mahsulotlar (${Cart.getCount()} ta)</span><span>${formatPrice(subtotal)}</span></div>
        <div class="summary-row"><span>Yetkazib berish</span><span>${shipping === 0 ? '<span style="color:var(--success)">Bepul</span>' : formatPrice(shipping)}</span></div>
        ${shipping > 0 ? `<p style="font-size:.75rem;color:var(--gray-500);margin-top:4px">500,000 so'mdan yuqori buyurtmalarda bepul</p>` : ''}
        <div class="summary-total"><span>Jami:</span><span style="color:var(--primary)">${formatPrice(total)}</span></div>
        <a href="checkout.html" class="btn btn-primary btn-block btn-lg" style="margin-top:20px">
          <i class="fas fa-lock"></i> Buyurtma berish
        </a>
        <a href="products.html" class="btn btn-ghost btn-block" style="margin-top:8px;text-align:center">
          <i class="fas fa-arrow-left"></i> Xaridni davom ettirish
        </a>
      </div>
    </div>`;
}

function updateCartItem(id, qty) {
  Cart.updateQty(id, qty);
  Cart.renderSidebar();
  renderCartPage();
}

function removeCartItem(id) {
  Cart.remove(id);
  Cart.renderSidebar();
  renderCartPage();
  showToast("Mahsulot savatdan o'chirildi");
}

document.addEventListener('DOMContentLoaded', () => {
  updateAuthUI();
  Cart.updateBadge();
  renderCartPage();
  document.getElementById('login-form')?.addEventListener('submit', handleLogin);
  document.getElementById('register-form')?.addEventListener('submit', handleRegister);
  document.getElementById('login-btn')?.addEventListener('click', () => openLoginModal());
  document.getElementById('logout-btn')?.addEventListener('click', handleLogout);
  document.querySelectorAll('.auth-tab').forEach(t => t.addEventListener('click', () => switchAuthTab(t.dataset.tab)));
  document.getElementById('auth-modal')?.addEventListener('click', e => { if (e.target.id === 'auth-modal') closeLoginModal(); });
  document.getElementById('cart-btn')?.addEventListener('click', openCart);
  document.getElementById('close-cart')?.addEventListener('click', closeCart);
  document.getElementById('overlay')?.addEventListener('click', closeCart);
  document.getElementById('menu-toggle')?.addEventListener('click', toggleMobileMenu);
  document.getElementById('search-form')?.addEventListener('submit', e => {
    e.preventDefault();
    const q = document.getElementById('search-input').value.trim();
    if (q) window.location.href = `products.html?search=${encodeURIComponent(q)}`;
  });
});
</script>
</body>
</html>
